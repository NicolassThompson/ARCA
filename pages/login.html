<!-- ===== LOGIN ===== -->
<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h2>Bem-vindo de volta</h2>
    <p class="auth-subtitle">Acesse sua conta para gerenciar seus animais</p>
    <div class="form-group">
      <label class="form-label">CPF ou e-mail</label>
      <input class="form-input" type="text" placeholder="000.000.000-00" value="000.000.000-00">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" placeholder="••••••••" value="password">
    </div>
    <div class="forgot"><a href="#">Esqueci minha senha</a></div>
    <button class="btn-full btn-full-primary" onclick="doLogin()">Entrar</button>
    <div class="divider">ou</div>
    <button class="btn-full btn-full-secondary" onclick="showPage('cadastro')">Criar conta</button>
    <div class="auth-footer-note">🔒 Acesso seguro · Prefeitura da Serra</div>
  </div>
</div>
