<!-- ===== LOGIN ===== -->
<div class="auth-layout">
  <div class="auth-card">
    <div class="auth-logo">🐾</div>
    <h2>Bem-vindo de volta</h2>
    <p class="auth-subtitle">Acesse sua conta para gerenciar seus animais</p>
    <div class="form-group">
      <label class="form-label">CPF</label>
      <input class="form-input" id="login-cpf" type="text" placeholder="000.000.000-00" required maxlength="14">
      <div class="form-error-msg" id="login-cpf-error">CPF inválido</div>
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" id="login-senha" type="password" placeholder="••••••" required maxlength="6">
      <div class="form-error-msg" id="login-auth-error">Usuário não encontrado ou senha incorreta</div>
    </div>
    <div class="forgot"><a href="#">Esqueci minha senha</a></div>
    <button class="btn-full btn-full-primary" onclick="doLogin()">Entrar</button>
    <div class="divider">ou</div>
    <button class="btn-full btn-full-secondary" onclick="showPage('cadastro')">Criar conta</button>
    <div class="auth-footer-note">🔒 Acesso seguro · Prefeitura da Serra</div>
  </div>
</div>
